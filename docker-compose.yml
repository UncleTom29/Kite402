version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kite402-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kite402
      POSTGRES_PASSWORD: kite402password
      POSTGRES_DB: kite402
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kite402']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kite402-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    container_name: kite402-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://kite402:kite402password@postgres:5432/kite402
      REDIS_URL: redis://redis:6379
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
