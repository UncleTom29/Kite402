specVersion: 0.0.5
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: KiteCardAttestation
    network: kite-ai-testnet
    source:
      address: "0x0000000000000000000000000000000000000000"  # populated from deployments/kiteTestnet.json
      abi: KiteCardAttestation
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - AttestationEvent
        - OperatorStats
      abis:
        - name: KiteCardAttestation
          file: ./abis/KiteCardAttestation.json
      eventHandlers:
        - event: CardAttested(indexed bytes32,indexed bytes32,uint256)
          handler: handleCardAttested
        - event: CardRevoked(indexed bytes32)
          handler: handleCardRevoked
      file: ./src/mapping.ts

  - kind: ethereum
    name: Kite402Registry
    network: kite-ai-testnet
    source:
      address: "0x0000000000000000000000000000000000000000"  # populated from deployments/kiteTestnet.json
      abi: Kite402Registry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - OperatorStats
      abis:
        - name: Kite402Registry
          file: ./abis/Kite402Registry.json
      eventHandlers:
        - event: AgentRegistered(indexed bytes32,indexed address,indexed address)
          handler: handleAgentRegistered
      file: ./src/mapping.ts

templates:
  - kind: ethereum
    name: AgentVault
    network: kite-ai-testnet
    source:
      abi: AgentVault
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - AgentVaultEvent
        - OperatorStats
      abis:
        - name: AgentVault
          file: ./abis/AgentVault.json
      eventHandlers:
        - event: Deposited(indexed bytes32,uint256)
          handler: handleDeposited
        - event: Withdrawn(indexed bytes32,indexed address,uint256)
          handler: handleWithdrawn
        - event: PolicyUpdated(indexed bytes32)
          handler: handlePolicyUpdated
      file: ./src/mapping.ts
